name: Install

on:
  pull_request:
    paths:
      - ".github/workflows/install.yml"
      - "package.json"
      - "scripts/**"
  push:
    branches:
      - develop
    paths:
      - ".github/workflows/install.yml"
      - "package.json"
      - "scripts/**"

permissions:
  contents: read

jobs:
  pack:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - run: |
          jq -c '.version = "1.28.0"' package.json > tmp.$$.json
          mv tmp.$$.json package.json
          npm pack

      - uses: actions/upload-artifact@v6
        with:
          name: installer
          path: Indobase-1.28.0.tgz

  npm:
    needs: pack
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: installer

      - run: npm init -y
      - run: npm i --save-dev ./Indobase-1.28.0.tgz
      - run: npx --no-install Indobase --version

  yarn:
    needs: pack
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: installer

      - run: yarn init -y
      - run: yarn add -D ./Indobase-1.28.0.tgz
      - run: yarn Indobase --version

  yarn_berry:
    needs: pack
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: installer

      - run: yarn set version berry
      # - run: yarn config set nodeLinker node-modules
      - run: yarn init -y
      - run: yarn add -D ./Indobase-1.28.0.tgz
      - if: ${{ matrix.os != 'windows-latest' }}
        run: yarn Indobase --version
      # Workaround for running extensionless executable on windows
      - if: ${{ matrix.os == 'windows-latest' }}
        run: |
          & "$(yarn bin Indobase).exe" --version

  pnpm:
    needs: pack
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: installer

      - run: npm install -g pnpm
      - run: pnpm init
      # https://github.com/pnpm/pnpm/issues/9124#issuecomment-2663021284
      - run: pnpm i --save-dev ./Indobase-1.28.0.tgz --allow-build=Indobase
      - run: pnpm Indobase --version

  bun:
    needs: pack
    strategy:
      fail-fast: false
      matrix:
        # Bun build is experimental on windows
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: installer

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: |
          echo '{"trustedDependencies": ["Indobase"]}' > package.json
      - run: bun add -D ./Indobase-1.28.0.tgz
      - run: bunx Indobase --version

